services:

  # ── MySQL ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - ptero-internal
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: panel
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      # Must pass root credentials or healthcheck silently fails on auth
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s   # Give MySQL time to fully initialize before retries count

  # ── Pterodactyl Redis (panel internal — never exposed) ─────────────────
  ptero-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - ptero-internal
    volumes:
      - ptero-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Minecraft Redis (game servers connect via server IP) ───────────────
  minecraft-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - minecraft-redis-data:/data

  # ── Pterodactyl Panel ──────────────────────────────────────────────────
  panel:
    image: ghcr.io/pterodactyl/panel:v1.11.11
    restart: unless-stopped
    networks:
      - ptero-internal
    ports:
      - "8082:80"
    volumes:
      - panel-var:/app/var
      - panel-nginx:/etc/nginx/http.d
      - panel-logs:/app/storage/logs
    environment:
      # !! Port MUST be included — omitting it breaks CSRF tokens and session cookies
      APP_URL: "http://${SERVER_IP}:8082"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_TIMEZONE: ${TIMEZONE:-UTC}

      # Database
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: ${MYSQL_PASSWORD}

      # Redis
      REDIS_HOST: ptero-redis
      REDIS_PORT: 6379

      # Drivers — these keys changed in Laravel 9+, old keys are silently ignored!
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis      # ← was QUEUE_DRIVER (broken on Laravel 9+)

      # Mail — MAIL_DRIVER is deprecated, use MAIL_MAILER
      MAIL_MAILER: log             # ← was MAIL_DRIVER (broken on newer panel versions)
      MAIL_FROM_ADDRESS: "noreply@example.com"
      MAIL_FROM_NAME: "Pterodactyl"

      # Critical for HTTP (non-HTTPS) setups — without this login will redirect-loop
      SESSION_SECURE_COOKIE: "false"
      TRUSTED_PROXIES: "*"
    depends_on:
      mysql:
        condition: service_healthy
      ptero-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/auth/login || exit 1"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 6
  # ── One-shot: Create admin user on first run ───────────────────────────
  # This runs once, creates your admin account, then exits.
  # It will error harmlessly on subsequent runs (duplicate email) — that's fine.
  panel-setup:
    image: ghcr.io/pterodactyl/panel:v1.11.11
    restart: "no"
    networks:
      - ptero-internal
    volumes:
      - panel-var:/app/var
      - panel-logs:/app/storage/logs
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        php /app/artisan p:user:make \
          --email=${ADMIN_EMAIL} \
          --username=${ADMIN_USERNAME} \
          --name-first=${ADMIN_FIRST} \
          --name-last=${ADMIN_LAST} \
          --password=${ADMIN_PASSWORD} \
          --admin=1 \
        && echo 'Admin user created!' \
        || echo 'User creation skipped (likely already exists).'
    environment:
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ptero-redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      panel:
        condition: service_healthy  # ← waits until curl /auth/login succeeds
      mysql:
        condition: service_healthy  # optional but safe — ensures DB is ready too

  # ── Pterodactyl Wings ──────────────────────────────────────────────────
  # Wings needs host networking to manage game server containers + port allocations.
  # It won't fully work until you configure it via the Panel (see Step 3 below).
  wings:
    image: ghcr.io/pterodactyl/wings:v1.11.11
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - /etc/pterodactyl:/etc/pterodactyl
      - /tmp/pterodactyl:/tmp/pterodactyl
    depends_on:
      panel:
        condition: service_healthy

  mlp-manager:
    build:
      context: ./MLPManager
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - ptero-internal
    ports:
      - "8083:8083"  # Changed to match application.yml server.port: 8083
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - /etc/pterodactyl:/etc/pterodactyl
      - ./MLPManager/config.yml:/app/config.yml:ro  # Mount config file into container
    depends_on:
      panel:
        condition: service_healthy
      mysql:
        condition: service_healthy


networks:
  ptero-internal:
    driver: bridge

volumes:
  mysql-data:
  ptero-redis-data:
  minecraft-redis-data:
  panel-var:
  panel-nginx:
  panel-logs:
