services:

  # ── MySQL ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - ptero-internal
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: panel
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Pterodactyl Redis (panel internal — never exposed) ─────────────────
  ptero-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - ptero-internal
    volumes:
      - ptero-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Minecraft Redis (game servers connect to this via server IP) ────────
  minecraft-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - minecraft-redis-data:/data

  # ── Pterodactyl Panel ──────────────────────────────────────────────────
  panel:
    image: ghcr.io/pterodactyl/panel:latest
    restart: unless-stopped
    networks:
      - ptero-internal
    ports:
      - "80:80"
    volumes:
      - panel-var:/app/var
      - panel-nginx:/etc/nginx/http.d
      - panel-logs:/app/storage/logs
    environment:
      APP_URL: "http://${SERVER_IP}"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_TIMEZONE: ${TIMEZONE}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ptero-redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_DRIVER: redis
      MAIL_DRIVER: log
      MAIL_FROM: "noreply@example.com"
    depends_on:
      mysql:
        condition: service_healthy
      ptero-redis:
        condition: service_healthy

  # ── Pterodactyl Wings ──────────────────────────────────────────────────
  # Wings uses host networking so it can manage game server containers
  # and their port allocations directly on the host network.
  # It won't be healthy until you paste the token from the Panel UI (step 6 below).
  wings:
    image: ghcr.io/pterodactyl/wings:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - /etc/pterodactyl:/etc/pterodactyl
      - /tmp/pterodactyl:/tmp/pterodactyl
    depends_on:
      - panel

networks:
  ptero-internal:
    driver: bridge

volumes:
  mysql-data:
  ptero-redis-data:
  minecraft-redis-data:
  panel-var:
  panel-nginx:
  panel-logs: